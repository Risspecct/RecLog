services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    # Optional: Mount data directory if CSVs update dynamically without rebuilding
    volumes:
      - ./backend/app/data:/app/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80" 
    depends_on:
      - backend
    restart: unless-stopped